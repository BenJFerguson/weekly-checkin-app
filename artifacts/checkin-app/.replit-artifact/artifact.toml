kind = "web"
previewPath = "/"
title = "Weekly Check-In App"
version = "1.0.0"
id = "artifacts/checkin-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23997

[services.development]
run = "pnpm --filter @workspace/checkin-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/checkin-app", "run", "build" ]
publicDir = "artifacts/checkin-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23997"
BASE_PATH = "/"
